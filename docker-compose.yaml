services:
  bot:
    image: ghcr.io/mai0313/discordbot:latest
    build:
      context: .
      target: prod
      dockerfile: ./docker/Dockerfile
    user: "1000:1000"
    command:
      - uv
      - run
      - discordbot
    environment:
      UV_NO_DEV: 1
      UV_FROZEN: 1
      UV_NO_SYNC: 1
      # uv still initializes its cache under $HOME at startup; images without a
      # passwd entry for UID 1000 resolve HOME to "/", which is not writable.
      UV_CACHE_DIR: /tmp/uv-cache
    env_file:
      - .env
    volumes:
      # Fail fast instead of letting compose create a root-owned ./data on first run.
      - type: bind
        source: ./data
        target: /app/data
        bind:
          create_host_path: false
      # Media hosting (oversized clips -> external URL) is opt-in: the bot self-disables and falls
      # back to native upload when the serve dir is absent (it never creates the dir), so the
      # default compose does not require it. When enabled the bot bounds the dir itself (size + age
      # caps) and reaps only its own content-addressed files, never anything else parked there. To
      # enable hosting, set the MEDIA_HOSTING_* env vars and bind-mount the host's nginx-served dir
      # (must exist, writable by UID 1000), e.g.:
      #   - type: bind
      #     source: /mnt/share/media
      #     target: /mnt/share/media
      #     bind:
      #       create_host_path: false
    network_mode: host
    restart: always
    pull_policy: always
