services:
  bot:
    image: ghcr.io/mai0313/discordbot:latest
    build:
      context: .
      target: prod
      dockerfile: ./docker/Dockerfile
    user: "1000:1000"
    command:
      - uv
      - run
      - discordbot
    environment:
      UV_NO_DEV: 1
      UV_FROZEN: 1
      UV_NO_SYNC: 1
      # uv still initializes its cache under $HOME at startup; images without a
      # passwd entry for UID 1000 resolve HOME to "/", which is not writable.
      UV_CACHE_DIR: /tmp/uv-cache
    env_file:
      - .env
    volumes:
      # Fail fast instead of letting compose create a root-owned ./data on first run.
      - type: bind
        source: ./data
        target: /app/data
        bind:
          create_host_path: false
      # Oversized media (clips too big for Discord's upload limit) is written here and served by
      # the host's nginx static site (MEDIA_HOSTING_SERVE_DIR). The host dir must already exist
      # and be writable by UID 1000; create_host_path: false fails fast if the mount is missing.
      - type: bind
        source: /mnt/share/media
        target: /mnt/share/media
        bind:
          create_host_path: false
    network_mode: host
    restart: always
    pull_policy: always
