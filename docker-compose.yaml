services:
  bot:
    image: ghcr.io/mai0313/discordbot:latest
    build:
      context: .
      target: prod
      dockerfile: ./docker/Dockerfile
    user: "1000:1000"
    command:
      - uv
      - run
      - discordbot
    environment:
      UV_NO_DEV: 1
      UV_FROZEN: 1
      UV_NO_SYNC: 1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    network_mode: host
    restart: always
    pull_policy: always
