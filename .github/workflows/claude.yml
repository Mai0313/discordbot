name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for Claude to push fixes to a branch
      pull-requests: write # Required for Claude to open PRs and reply to reviews
      issues: write # Required for Claude to comment on issues
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The action loads settings from the `user` source, so a CLAUDE.md placed in the
      # runner's HOME is picked up as global memory alongside the repo's own CLAUDE.md.
      # Skipped entirely when the variable is unset.
      - name: Install global CLAUDE.md
        if: vars.AGENT_GLOBAL_CLAUDE_MD_URL != ''
        env:
          URL: ${{ vars.AGENT_GLOBAL_CLAUDE_MD_URL }}
        run: |
          mkdir -p "${HOME}/.claude"
          curl -fsSL "${URL}" -o "${HOME}/.claude/CLAUDE.md"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Skills come from a plugin marketplace. Both are newline-separated and
          # optional, so an unconfigured repo runs with the built-in skills only.
          # AGENT_PLUGIN_MARKETPLACES: git URLs, e.g. https://github.com/OWNER/skills.git
          # AGENT_PLUGINS: plugin names, e.g. personal@marketplace-name
          plugin_marketplaces: ${{ vars.AGENT_PLUGIN_MARKETPLACES }}
          plugins: ${{ vars.AGENT_PLUGINS }}

          # Merged into the runner's ~/.claude/settings.json. Only settings that mean
          # something headless belong here; TUI keys are deliberately left out.
          settings: |
            {
              "effortLevel": "high",
              "attribution": { "pr": "", "sessionUrl": false }
            }
