name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions: write-all

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Claude acts through its own GitHub App token, which already carries
          # contents/pull-requests/issues write. Everything beyond that has to be
          # requested here.
          additional_permissions: |
            actions: write

          # Personal skills. The action adds the marketplace and installs the plugin
          # before the session starts, so these behave exactly like a local install.
          plugin_marketplaces: https://github.com/Mai0313/skills.git
          plugins: personal@mai0313-skills

          # Merged into the runner's ~/.claude/settings.json. Only keys that mean
          # something headless belong here; TUI keys are deliberately left out.
          settings: |
            {
              "effortLevel": "high",
              "attribution": { "pr": "", "sessionUrl": false }
            }
